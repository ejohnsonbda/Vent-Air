<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    background: #0B0B0B;
    -webkit-text-size-adjust: 100%;
  }

  body {
    height: 100%;
    background: #0B0B0B;
    font-family: "Manrope", system-ui, sans-serif;
    color: rgba(255,255,255,0.94);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  #root {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: stretch;
    justify-content: center;
    overflow: hidden;
    background: #050505;
  }

  /* ── app shell: phone on mobile, centred column on larger screens ── */
  .app-shell {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0B0B;
    /* safe-area insets only matter on real phones */
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    padding-left: env(safe-area-inset-left, 0px);
    padding-right: env(safe-area-inset-right, 0px);
    box-sizing: border-box;
  }

  /* tablet — centred column, looks like the phone frame without chrome */
  @media (min-width: 640px) {
    #root {
      align-items: center;
      padding: 32px;
      /* subtle dot-grid texture behind the column */
      background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .app-shell {
      width: 420px;
      max-width: 100%;
      height: 100%;
      max-height: 840px;
      border-radius: 24px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.07);
      flex-shrink: 0;
      /* no safe-area needed on tablet/laptop browsers */
      padding: 0;
    }
  }

  /* laptop / wide monitor — a little taller allowance */
  @media (min-width: 1024px) {
    #root { padding: 48px; }
    .app-shell { max-height: 900px; }
  }

  /* Hide scrollbars inside screens — native feel */
  ::-webkit-scrollbar { width: 0; height: 0; }
  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  /* Prevent pull-to-refresh on mobile */
  html, body { overscroll-behavior-y: none; }

  @keyframes ventFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes ventRise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes ventBloom {
    0%   { opacity: 0; transform: scale(0.6); }
    70%  { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes ventSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes ventPulse {
    0%, 100% { transform: scale(1);   opacity: 0.55; }
    50%      { transform: scale(1.18); opacity: 0.9;  }
  }
  @keyframes ventDrift {
    from { transform: translate(0, 0); }
    to   { transform: translate(40%, -10%); }
  }
</style>

// ─── breathing exercise ───────────────────────────────────

const BREATH_PHASES = [
  { key: 'inhale', label: 'Inhale', hint: 'fill gently',    dur: 4 },
  { key: 'hold',   label: 'Hold',   hint: 'rest there',     dur: 7 },
  { key: 'exhale', label: 'Exhale', hint: 'let it all out', dur: 8 },
];

function BreathScreen({ ctx }) {
  const t = THEME;
  const [running, setRunning] = useState(false);
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(BREATH_PHASES[0].dur);
  const [cycles, setCycles] = useState(0);
  const phase = BREATH_PHASES[phaseIdx];
  const ringRef = useRef(null);
  const haloRef = useRef(null);
  const animsRef = useRef([]);

  useEffect(() => {
    if (!running) return;
    let last = performance.now();
    const id = setInterval(() => {
      const now = performance.now();
      const dt = (now - last) / 1000;
      last = now;
      setTimeLeft((tl) => {
        const next = tl - dt;
        if (next <= 0) {
          setPhaseIdx((p) => { const np = (p + 1) % BREATH_PHASES.length; if (np === 0) setCycles((c) => c + 1); return np; });
          return 0;
        }
        return next;
      });
    }, 100);
    return () => clearInterval(id);
  }, [running]);

  useEffect(() => { setTimeLeft(phase.dur); }, [phaseIdx]);

  useEffect(() => {
    if (!running) { animsRef.current.forEach((a) => { try { a.pause(); } catch {} }); return; }
    animsRef.current.forEach((a) => { try { a.cancel(); } catch {} });
    animsRef.current = [];
    const PEAK = 1.18, REST = 0.82;
    const from = phase.key === 'inhale' ? REST : PEAK;
    const to   = phase.key === 'exhale' ? REST : PEAK;
    const easing = phase.key === 'inhale' ? 'cubic-bezier(.4,0,.2,1)' : phase.key === 'exhale' ? 'cubic-bezier(.6,0,.4,1)' : 'linear';
    for (const el of [ringRef.current, haloRef.current]) {
      if (!el) continue;
      const a = el.animate([{ transform: `scale(${from})` }, { transform: `scale(${to})` }], { duration: phase.dur * 1000, easing, fill: 'forwards' });
      animsRef.current.push(a);
    }
  }, [phaseIdx, running]);

  const reset = () => {
    setRunning(false); setPhaseIdx(0); setTimeLeft(BREATH_PHASES[0].dur); setCycles(0);
    animsRef.current.forEach((a) => { try { a.cancel(); } catch {} });
    animsRef.current = [];
    if (ringRef.current) ringRef.current.style.transform = 'scale(1)';
    if (haloRef.current) haloRef.current.style.transform = 'scale(1)';
  };

  return (
    <Screen padding={0} style={{ position: 'relative', overflow: 'hidden' }}>
      <BackdropPortrait />
      <div style={{ position: 'relative', zIndex: 1, flex: 1, padding: '0 24px 24px', display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '24px 0 4px' }}><TopBar onBack={() => ctx.go(ctx.state.lastRoute || 'welcome')} /></div>
        <div style={{ fontFamily: '"Anton", system-ui', fontSize: 36, color: t.text, letterSpacing: '0.02em', lineHeight: 1, textTransform: 'uppercase' }}>Breathe.</div>
        <div style={{ fontFamily: '"Manrope", system-ui', fontSize: 12, color: t.muted, marginTop: 8, letterSpacing: '0.18em', textTransform: 'uppercase', fontWeight: 700 }}>4 · 7 · 8 rhythm</div>

        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', position: 'relative', minHeight: 240 }}>
          <div ref={haloRef} style={{ position: 'absolute', width: 280, height: 280, borderRadius: '50%', background: `radial-gradient(circle, ${t.accent}26, transparent 65%)`, opacity: running ? 1 : 0.35, transition: 'opacity 400ms ease', pointerEvents: 'none', willChange: 'transform' }} />
          <div ref={ringRef} style={{ position: 'relative', width: 220, height: 220, borderRadius: '50%', background: '#0f0f0f', boxShadow: running ? `0 0 0 2px ${t.accent}, 0 0 0 8px ${t.accent}22, 0 0 60px -8px ${t.accent}99` : `0 0 0 1px ${t.accent}66, inset 0 0 30px rgba(0,0,0,0.6)`, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'box-shadow 400ms ease', willChange: 'transform' }}>
            <div style={{ width: 164, height: 164, borderRadius: '50%', background: '#050505', border: `1px solid ${t.accent}55`, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '0 16px', boxSizing: 'border-box' }}>
              <div style={{ fontFamily: '"Manrope", system-ui', fontSize: 10, color: t.accent, letterSpacing: '0.32em', textTransform: 'uppercase', fontWeight: 700 }}>{phase.label}</div>
              <div style={{ fontFamily: '"Anton", system-ui', fontSize: 58, lineHeight: 1, color: t.text, marginTop: 6, letterSpacing: '0.02em', fontVariantNumeric: 'tabular-nums' }}>{Math.ceil(timeLeft) || phase.dur}</div>
              <div style={{ fontFamily: '"Manrope", system-ui', fontSize: 10, color: t.muted, marginTop: 10, letterSpacing: '0.04em' }}>{running ? phase.hint : 'tap start when ready'}</div>
            </div>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '4fr 7fr 8fr', gap: 6, marginBottom: 14 }}>
          {BREATH_PHASES.map((p, i) => {
            const isActive = i === phaseIdx && running;
            const fill = i < phaseIdx ? 1 : i === phaseIdx ? Math.min(1, (p.dur - timeLeft) / p.dur) : 0;
            return (
              <div key={p.key} style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                <div style={{ height: 3, background: t.line, borderRadius: 2, overflow: 'hidden' }}>
                  <div style={{ width: `${fill * 100}%`, height: '100%', background: t.accent, transition: 'width 100ms linear' }} />
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: '"Manrope", system-ui', fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 700, color: isActive ? t.accent : t.muted }}>
                  <span>{p.label}</span><span style={{ fontVariantNumeric: 'tabular-nums' }}>{p.dur}s</span>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ display: 'flex', background: t.surface, border: `1px solid ${t.line}`, borderRadius: 6, padding: '10px 16px', marginBottom: 14, fontFamily: '"Manrope", system-ui' }}>
          {[
            { label: 'Cycles', value: cycles },
            { label: 'Time',   value: `${String(Math.floor(cycles * 19 / 60)).padStart(2,'0')}:${String(cycles * 19 % 60).padStart(2,'0')}` },
            { label: 'State',  value: running ? 'flow' : cycles > 0 ? 'paused' : 'ready' },
          ].map((s, i) => (
            <React.Fragment key={s.label}>
              {i > 0 && <div style={{ width: 1, background: t.line, margin: '0 12px' }} />}
              <div style={{ flex: 1, textAlign: 'center' }}>
                <div style={{ fontSize: 9, color: t.accent, fontWeight: 700, letterSpacing: '0.22em', textTransform: 'uppercase' }}>{s.label}</div>
                <div style={{ fontSize: 16, color: t.text, marginTop: 3, fontFamily: '"Anton", system-ui', letterSpacing: '0.04em', fontVariantNumeric: 'tabular-nums', textTransform: 'uppercase' }}>{s.value}</div>
              </div>
            </React.Fragment>
          ))}
        </div>

        <div style={{ display: 'flex', gap: 10 }}>
          {!running
            ? <VButton full variant="primary" onClick={() => setRunning(true)}>{cycles > 0 ? 'Resume' : 'Begin'}</VButton>
            : <VButton full variant="outline" onClick={() => setRunning(false)}>Pause</VButton>}
          <button onClick={reset} style={{ width: 52, height: 52, flexShrink: 0, background: 'transparent', border: `1px solid ${t.line}`, color: t.muted, borderRadius: 2, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', WebkitTapHighlightColor: 'transparent', touchAction: 'manipulation' }} aria-label="Reset">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 109-3M3 8L1 6m2 2l2-2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
          </button>
        </div>

        <button onClick={() => { setRunning(false); animsRef.current.forEach((a) => { try { a.pause(); } catch {} }); ctx.startFromBreath(cycles); }} style={{ marginTop: 12, padding: '14px 16px', background: cycles > 0 ? `${t.accent}14` : 'transparent', border: `1px solid ${cycles > 0 ? t.accent + '66' : t.line}`, borderRadius: 2, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', color: cycles > 0 ? t.accent : t.muted, fontFamily: '"Manrope", system-ui', fontSize: 13, fontWeight: 700, letterSpacing: '0.18em', textTransform: 'uppercase', WebkitTapHighlightColor: 'transparent', touchAction: 'manipulation', transition: 'all 200ms ease' }}>
          <span>{cycles > 0 ? 'How does it feel now?' : 'Skip · Share how you feel'}</span>
          <ArrowRight />
        </button>
      </div>
    </Screen>
  );
}

// ─── app ─────────────────────────────────────────────────

function App() {
  const [state, setState] = useState({
    route: 'welcome', lastRoute: 'welcome',
    emotion: null, vent: '',
    prompt: window.VENT_PROMPTS[0],
    source: null, breathCycles: 0,
    submitError: null,
  });

  const ctx = {
    state,
    go: (route) => setState(s => ({ ...s, lastRoute: s.route, route })),
    setEmotion: (e) => setState(s => ({ ...s, emotion: e })),
    setVent: (v) => setState(s => ({ ...s, vent: v })),
    submit: async () => {
      setState(s => ({ ...s, lastRoute: s.route, route: 'submitting', submitError: null }));
      try {
        const { error } = await db.from('vents').insert({
          'I am felling': state.emotion?.label ?? null,
          'vb_Anonymous': state.vent,
          'Owner':        null,
        });
        if (error) throw error;
        setState(s => ({ ...s, lastRoute: 'submitting', route: 'thanks', submitError: null }));
      } catch (err) {
        setState(s => ({ ...s, submitError: err.message || 'Something went wrong.' }));
      }
    },
    reset: () => {
      const next = window.VENT_PROMPTS[Math.floor(Math.random() * window.VENT_PROMPTS.length)];
      setState({ route: 'emotion', lastRoute: 'thanks', emotion: null, vent: '', prompt: next, source: null, breathCycles: 0, submitError: null });
    },
    startFromBreath: (cycles) => {
      setState(s => ({ ...s, lastRoute: 'breathe', route: 'emotion', emotion: null, vent: '', source: 'breath', breathCycles: cycles || 0 }));
    },
  };

  const screens = {
    welcome:    <WelcomeScreen ctx={ctx} />,
    emotion:    <EmotionScreen ctx={ctx} />,
    vent:       <VentScreen ctx={ctx} />,
    review:     <ReviewScreen ctx={ctx} />,
    submitting: <SubmittingScreen ctx={ctx} />,
    thanks:     <ThanksScreen ctx={ctx} />,
    support:    <SupportScreen ctx={ctx} />,
    privacy:    <PrivacyScreen ctx={ctx} />,
    breathe:    <BreathScreen ctx={ctx} />,
  };

  return (
    <div className="app-shell">
      <div key={state.route} style={{ width: '100%', height: '100%' }}>
        {screens[state.route]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
